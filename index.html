<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>戦国ランナー - 走れ！金の豹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1C1C1C;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'DotGothic16', cursive, monospace;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            max-width: 100vw;
            border: 4px solid #C9A94E;
            box-shadow:
                0 0 0 2px #1C1C1C,
                0 0 0 6px #CB4042,
                0 0 30px rgba(201, 169, 78, 0.3);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(28, 28, 28, 0.85);
            z-index: 10;
            transition: opacity 0.3s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h1 {
            color: #C9A94E;
            font-size: 2.5em;
            text-shadow: 3px 3px 0 #CB4042;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        #overlay h2 {
            color: #FEDFE1;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        #overlay .subtitle {
            color: #CB4042;
            font-size: 1em;
            margin-bottom: 20px;
        }

        #startBtn {
            background: #CB4042;
            color: #FEDFE1;
            border: 3px solid #C9A94E;
            padding: 12px 40px;
            font-family: 'DotGothic16', cursive, monospace;
            font-size: 1.3em;
            cursor: pointer;
            letter-spacing: 0.15em;
            transition: all 0.15s;
            image-rendering: pixelated;
        }

        #startBtn:hover {
            background: #C9A94E;
            color: #1C1C1C;
            transform: scale(1.05);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        .controls-hint {
            color: #7B8D42;
            font-size: 0.8em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="overlay">
            <h1>戦国ランナー</h1>
            <h2>〜 走れ！金の豹 〜</h2>
            <div class="subtitle">▼ 戦国の世を駆け抜けよ ▼</div>
            <button id="startBtn">出陣</button>
            <div class="controls-hint">スペースキー / タップ でジャンプ</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
